name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  script-sanity:
    name: Script Sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Shell script syntax check
        run: |
          set -euo pipefail
          for script in scripts/*.sh; do
            bash -n "$script"
          done

      - name: Python script compile check
        run: |
          python -m py_compile scripts/*.py

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/server-python-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/server-python-dev.txt

      - name: Run lint
        run: make lint

  typecheck:
    name: Typecheck (MyPy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/server-python-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/server-python-dev.txt

      - name: Run typecheck
        run: make typecheck

  tests:
    name: Unit Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/server-python-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/server-python-dev.txt

      - name: Run tests
        run: make test

  smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements/server-python-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/server-python-dev.txt

      - name: Run smoke check
        run: make smoke

  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs:
      - script-sanity
      - lint
      - typecheck
      - tests
      - smoke
    steps:
      - name: Verify all required jobs passed
        run: |
          echo "script-sanity=${{ needs.script-sanity.result }}"
          echo "lint=${{ needs.lint.result }}"
          echo "typecheck=${{ needs.typecheck.result }}"
          echo "tests=${{ needs.tests.result }}"
          echo "smoke=${{ needs.smoke.result }}"

          [[ "${{ needs.script-sanity.result }}" == "success" ]] || exit 1
          [[ "${{ needs.lint.result }}" == "success" ]] || exit 1
          [[ "${{ needs.typecheck.result }}" == "success" ]] || exit 1
          [[ "${{ needs.tests.result }}" == "success" ]] || exit 1
          [[ "${{ needs.smoke.result }}" == "success" ]] || exit 1
